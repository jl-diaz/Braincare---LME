<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainCare - Registro</title>
    <link rel="stylesheet" href="./css/tailwind-output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="font-poppins auth-body bg-cover bg-center bg-no-repeat h-screen" style="background-image: url('./img/Bosque1.png');">
    <header class="site-header">
        <div class="header-container">
            <a class="brand" href="index.html"><span>Braincare</span></a>
            <button class="menu-toggle" aria-expanded="false" aria-controls="siteNav"><i class="fa-solid fa-bars"></i></button>
            <nav id="siteNav" class="nav">
                <ul class="nav-left">
                    <li><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="dropdown">
                        <a href="#" class="nav-link dropdown-toggle">Información</a>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="articulos.html"><i class="fas fa-book-open"></i> Artículos</a>
                            <a class="dropdown-item" href="guias.html"><i class="fas fa-book"></i> Guías</a>
                            <a class="dropdown-item" href="sobre-nosotros.html"><i class="fas fa-users"></i> Nosotros</a>
                        </div>
                    </li>
                </ul>
                <ul class="nav-right">
                    <li><a class="nav-link" href="login.html">Iniciar Sesión</a></li>
                    <li><a class="nav-link" href="index.html">Volver al inicio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div id="mobilePanel" class="mobile-panel">
        <div class="mobile-links">
        </div>
    </div>

    <div class="auth-container flex justify-center w-full mt-5">
        <div class="auth-card w-full max-w-xl mx-5 my-5">
            <div class="auth-card-body p-8">
                <h2 class="auth-title text-center mb-6 text-5xl font-semibold text-bc-primary">Crear tu perfil</h2>
                <form id="registerForm">
                    <div class="auth-form-group mb-4">
                        <input type="text" id="name" class="auth-input block w-full px-4 py-3.5 text-base text-[#495057] bg-[#DCD7E7] border border-[#3C3C3C] rounded" placeholder="Nombre" required minlength="2">
                    </div>
                    <div class="auth-form-group mb-4">
                        <input type="email" id="email" class="auth-input block w-full px-4 py-3.5 text-base text-[#495057] bg-[#DCD7E7] border border-[#3C3C3C] rounded" placeholder="Correo electrónico" required>
                    </div>
                    <div class="auth-form-group mb-4 relative">
                        <input type="password" id="password" class="auth-input block w-full px-4 py-3.5 text-base text-[#495057] bg-[#DCD7E7] border border-[#3C3C3C] rounded" placeholder="Contraseña" required minlength="8">
                        <span class="password-toggle absolute right-4 top-3.5 cursor-pointer" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div class="auth-form-group mb-4 relative">
                        <input type="password" id="confirmPassword" class="auth-input block w-full px-4 py-3.5 text-base text-[#495057] bg-[#DCD7E7] border border-[#3C3C3C] rounded" placeholder="Confirmar contraseña" required minlength="8">
                        <span class="password-toggle absolute right-4 top-3.5 cursor-pointer" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div class="auth-button-container">
                        <button type="submit" class="auth-button bg-bc-primary w-full text-white font-bold border-none py-2.5 px-5 text-xl rounded-md cursor-pointer shadow-md active:translate-y-0.5">Registrarse</button>
                    </div>
                </form>
                <div class="auth-links mt-4 text-center">
                    <p>¿Ya tienes una cuenta? <a href="login.html" class="text-bc-primary font-bold">Iniciar sesión</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
